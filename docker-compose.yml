services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ./.env
      - ./apps/backend/.env
    ports:
      - "37881:4000"
    depends_on:
      db:
        condition: service_healthy
      # бэкенд полагается на mock-server и redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:4000/readiness').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - lbe-network

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - ./.env
    ports:
      - "37883:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    networks:
      - lbe-network

networks:
  lbe-network:
    driver: bridge

volumes:
  postgres-data:
